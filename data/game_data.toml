[[items]]
id = "quartz_memory_knowledge"
name = "Quartz Memory: Scientia"
glyph = "*"
color = 45
legend = "Quartz memory"
status = "Record"
description = "[SCIENTIA-03/07 | restore 31%]\nRecovered from the Apostolic Signal Lattice. Restored lines note paired handling of Subjects III and IV and symbolic-response trials through the Catechism Gate."

[[items]]
id = "quartz_memory_life"
name = "Quartz Memory: Vita"
glyph = "*"
color = 78
legend = "Quartz memory"
status = "Record"
description = "[VITA-05/07 | restore 27%]\nRecovered from the Helix Perfusion Cradle. Cross-feed between the sibling subjects stabilized, yet neither developed a dedicated offensive morphology under vascular rehearsal."

[[items]]
id = "quartz_memory_dimension"
name = "Quartz Memory: Dimensio"
glyph = "*"
color = 111
legend = "Quartz memory"
status = "Record"
description = "[DIMENSIO-02/11 | restore 18%]\nFragmentary log from the Shear Ring Annex. Pre-awakening specimen recovered suspended from a cavern ceiling organ and transferred to the Orthogonal Coupling Frame."

[[items]]
id = "quartz_memory_interface"
name = "Quartz Memory: Interface"
glyph = "*"
color = 117
legend = "Quartz memory"
status = "Record"
description = "[INTERFACE-04/09 | restore 22%]\nBridge test from the Litany Relay Spine. Subject V did not respond to spoken prompts, but the cranial halo accepted twelve seconds of one-way handshake through Port AURELIA."

[[items]]
id = "quartz_memory_extraction"
name = "Quartz Memory: Extraction"
glyph = "*"
color = 124
legend = "Quartz memory"
status = "Record"
description = "[EXTRACT-06/10 | restore 19%]\nReadout from the Pneuma Bore Array. Filament taps recovered non-linguistic signal clusters from peri-cardial tissue; operators tagged them as key-bearing residues."

[[items]]
id = "quartz_memory_archive"
name = "Quartz Memory: Archive"
glyph = "*"
color = 187
legend = "Quartz memory"
status = "Record"
description = "[ARCHIVE-02/05 | restore 44%]\nVault index copied from the Sepulcher Stack. Entries list Oriens and Occasus as devotional epochs, then reclassify all later apostolic remains under vivisection and systems intake."

[[items]]
id = "quartz_memory_cathedral"
name = "Quartz Memory: Cathedral"
glyph = "*"
color = 189
legend = "Quartz memory"
status = "Record"
description = "[CATHEDRAL-08/12 | restore 16%]\nMaintenance strip from the Cathedral Engine. Frame-bells were tuned to match Subject II impact harmonics before release into the lower nave corridor."

[[items]]
id = "quartz_memory_halo"
name = "Quartz Memory: Halo"
glyph = "*"
color = 153
legend = "Quartz memory"
status = "Record"
description = "[HALO-01/08 | restore 39%]\nCranial assembly note. A six-spoke halo crown was seated over the cervical ring and pinned to the Catechism Gate bus for passive key listening."

[[items]]
id = "quartz_memory_lung"
name = "Quartz Memory: Lung"
glyph = "*"
color = 114
legend = "Quartz memory"
status = "Record"
description = "[LUNG-03/06 | restore 28%]\nFlow report from the Choral Lung Tower. Pressure organs grown for Subject IV continued singing after tissue separation and were rerouted into coolant hymn lines."

[[items]]
id = "quartz_memory_ossuary"
name = "Quartz Memory: Ossuary"
glyph = "*"
color = 250
legend = "Quartz memory"
status = "Record"
description = "[OSSUARY-07/09 | restore 24%]\nBone inventory from the Ossuary Rail. Later apostolic remains were sawn into standard lengths to fit carriage teeth and vertebral indexing clamps."

[[items]]
id = "quartz_memory_choir"
name = "Quartz Memory: Choir"
glyph = "*"
color = 141
legend = "Quartz memory"
status = "Record"
description = "[CHOIR-05/11 | restore 21%]\nAcoustic capture log. The Resonance Choir Array produced stable echo maps only when attendants recited Oriens liturgies through a blood-warm diaphragm cone."

[[items]]
id = "quartz_memory_witness"
name = "Quartz Memory: Witness"
glyph = "*"
color = 224
legend = "Quartz memory"
status = "Record"
description = "[WITNESS-02/04 | restore 51%]\nHuman testimony filed into the Witness Vault. Surviving staff described Subject V as sleeping, but all monitor petals had already opened toward the Orthogonal Coupling Frame."

